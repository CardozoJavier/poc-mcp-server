spring.application.name=poc-mcp-server
server.address=127.0.0.1

spring.ai.mcp.server.name=poc-mcp-server
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.instructions=This MCP server is intended for payment gateway integration. Use its tools to inspect the current scope and validate payment request inputs before external gateway calls are added.
spring.ai.mcp.server.annotation-scanner.enabled=true

management.endpoints.web.exposure.include=health,info

app.security.username=${MCP_SERVER_USERNAME:mcp}
app.security.password=${MCP_SERVER_PASSWORD:change-me-local-only}

logging.level.root=INFO
logging.level.com.cardozojavier.pocmcpserver=INFO
